<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGX HUB | Admin Dashboard</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: none;"> <!-- Hidden until auth check passes -->

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">BGX HUB <span style="font-size: 1rem; color: #fff; text-shadow: none;">Admin</span></a>
        <div class="nav-links">
            <button id="logoutBtn" class="btn btn-secondary" style="padding: 0.5rem 1rem;"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </nav>
    <div class="spacer"></div>

    <div class="container">
        
        <div class="admin-container">
            <h2 class="section-title"><i class="fas fa-plus-circle" style="color: var(--primary-color);"></i> Add New Video</h2>
            
            <div id="formAlert" class="alert success" style="display: none;">Video added successfully!</div>
            
            <form id="videoForm">
                <input type="hidden" id="videoId">
                
                <div class="form-group">
                    <label>Video Title</label>
                    <input type="text" id="v_title" class="form-control" required placeholder="Epic Gaming Montage 2026">
                </div>
                
                <div class="form-group">
                    <label>Category</label>
                    <select id="v_category" class="form-control" required style="appearance: auto;">
                        <option value="Gaming">Gaming</option>
                        <option value="Music">Music</option>
                        <option value="Movies">Movies</option>
                        <option value="Tech">Tech</option>
                        <option value="Vlogs">Vlogs</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Thumbnail Image URL</label>
                    <input type="url" id="v_thumb" class="form-control" required placeholder="https://example.com/thumb.jpg">
                </div>

                <div class="form-group">
                    <label>Video Link (MP4 or embed link limit to src base only)</label>
                    <input type="url" id="v_link" class="form-control" required placeholder="https://example.com/video.mp4">
                </div>

                <div class="form-group">
                    <label>Preview Link (For iframe usually)</label>
                    <input type="url" id="v_preview" class="form-control" required placeholder="https://youtube.com/embed/xyz">
                </div>

                <div class="form-group">
                    <label>Sponsor Link 1 (Direct)</label>
                    <input type="url" id="v_promo_direct" class="form-control" required placeholder="https://sponsor-link.com/click">
                </div>

                <div class="form-group">
                    <label>Sponsor Link 2 (Video Event)</label>
                    <input type="url" id="v_video_promo" class="form-control" required placeholder="https://sponsor-link.com/video-click">
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn" id="saveVideoBtn"><i class="fas fa-save"></i> Save Video</button>
                    <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display: none;"><i class="fas fa-times"></i> Cancel Edit</button>
                </div>
            </form>
        </div>

        <div class="admin-container" style="max-width: 1000px; margin-top: 2rem;">
            <h2 class="section-title"><i class="fas fa-list" style="color: var(--primary-color);"></i> Manage Videos</h2>
            
            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Thumbnail</th>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="videosTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center;"><div class="loader"></div></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Admin Logic Integration -->
    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { collection, addDoc, getDocs, doc, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // Security Authentication Protection
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'admin-login.html';
            } else {
                // Show body when authenticated
                document.body.style.display = 'block';
                loadVideos();
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'admin-login.html';
        });

        // Form elements
        const videoForm = document.getElementById('videoForm');
        const alertBox = document.getElementById('formAlert');
        const idInput = document.getElementById('videoId');
        const titleInput = document.getElementById('v_title');
        const catInput = document.getElementById('v_category');
        const thumbInput = document.getElementById('v_thumb');
        const linkInput = document.getElementById('v_link');
        const previewInput = document.getElementById('v_preview');
        const promoInput = document.getElementById('v_promo_direct');
        const vPromoInput = document.getElementById('v_video_promo');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const saveVideoBtn = document.getElementById('saveVideoBtn');

        // CRUD variables
        let videos = [];
        const videosCollection = collection(db, 'videos');

        // Load Videos
        async function loadVideos() {
            try {
                const q = query(videosCollection, orderBy('timestamp', 'desc'));
                const querySnapshot = await getDocs(q);
                videos = [];
                const tbody = document.getElementById('videosTableBody');
                tbody.innerHTML = '';
                
                if (querySnapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No videos found</td></tr>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const video = { id: docSnap.id, ...docSnap.data() };
                    videos.push(video);
                    
                    const dateObj = new Date(video.timestamp || Date.now());
                    const dateStr = dateObj.toLocaleDateString();

                    tbody.innerHTML += `
                        <tr>
                            <td><img src="${video.thumbnailUrl}" style="width: 80px; height: 45px; object-fit: cover; border-radius: 4px; border: 1px solid var(--card-border);"></td>
                            <td style="max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main);">${video.title}</td>
                            <td><span style="background: var(--card-bg); padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; border: 1px solid var(--card-border);">${video.category}</span></td>
                            <td>${dateStr}</td>
                            <td>
                                <div class="action-btns">
                                    <button class="btn btn-secondary" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;" onclick="window.editVideo('${video.id}')"><i class="fas fa-edit"></i> Edit</button>
                                    <button class="btn btn-danger" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;" onclick="window.deleteVideo('${video.id}')"><i class="fas fa-trash"></i> Delete</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error loading videos: ", error);
            }
        }

        // Save Form Logic (Add & Update)
        videoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // disable btn
            saveVideoBtn.disabled = true;
            saveVideoBtn.innerHTML = '<div class="loader"></div> Saving...';

            const videoData = {
                title: titleInput.value,
                category: catInput.value,
                thumbnailUrl: thumbInput.value,
                videoLink: linkInput.value,
                previewLink: previewInput.value,
                promoDirectLink: promoInput.value,
                videoPromoDirectLink: vPromoInput.value,
                timestamp: Date.now() // Simple timestamp fallback since we can't easily rely on serverTimestamp purely across all module ver
            };

            try {
                if (idInput.value) {
                    // Update existing
                    const docRef = doc(db, 'videos', idInput.value);
                    // Retain old timestamp
                    const existingVid = videos.find(v => v.id === idInput.value);
                    if(existingVid && existingVid.timestamp) {
                        videoData.timestamp = existingVid.timestamp;
                    }
                    await updateDoc(docRef, videoData);
                    showAlert("Video updated successfully!", "success");
                } else {
                    // Add new
                    await addDoc(videosCollection, videoData);
                    showAlert("Video added successfully!", "success");
                }
                
                resetForm();
                loadVideos();
            } catch (error) {
                console.error("Error saving video:", error);
                showAlert("Error saving video: " + error.message, "error");
            } finally {
                // re-enable
                saveVideoBtn.disabled = false;
                saveVideoBtn.innerHTML = '<i class="fas fa-save"></i> Save Video';
            }
        });

        // Edit Video globally exposed
        window.editVideo = (id) => {
            const video = videos.find(v => v.id === id);
            if (!video) return;

            idInput.value = video.id;
            titleInput.value = video.title;
            catInput.value = video.category || 'Gaming';
            thumbInput.value = video.thumbnailUrl;
            linkInput.value = video.videoLink;
            previewInput.value = video.previewLink;
            promoInput.value = video.promoDirectLink || '';
            vPromoInput.value = video.videoPromoDirectLink || '';

            cancelEditBtn.style.display = 'inline-block';
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Delete globally exposed
        window.deleteVideo = async (id) => {
            if (confirm("Are you sure you want to delete this video?")) {
                try {
                    await deleteDoc(doc(db, 'videos', id));
                    showAlert("Video deleted!", "success");
                    loadVideos();
                } catch (error) {
                    showAlert("Error deleting: " + error.message, "error");
                }
            }
        };

        cancelEditBtn.addEventListener('click', resetForm);

        function resetForm() {
            videoForm.reset();
            idInput.value = '';
            cancelEditBtn.style.display = 'none';
        }

        function showAlert(msg, type) {
            alertBox.textContent = msg;
            alertBox.className = `alert ${type}`;
            alertBox.style.display = 'block';
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 3000);
        }

    </script>
</body>
</html>
