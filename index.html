<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGX HUB | Modern Video Sharing</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">BGX HUB</a>
        
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search videos...">
            <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i></button>
        </div>

        <div class="nav-links">
            <a href="admin-login.html" title="Admin Login"><i class="fas fa-user-shield"></i> Admin</a>
        </div>
    </nav>
    <div class="spacer"></div>

    <!-- Category System -->
    <div class="categories" id="categoryContainer">
        <button class="category-btn active" data-category="All">All</button>
        <button class="category-btn" data-category="Gaming">Gaming</button>
        <button class="category-btn" data-category="Music">Music</button>
        <button class="category-btn" data-category="Movies">Movies</button>
        <button class="category-btn" data-category="Tech">Tech</button>
        <button class="category-btn" data-category="Vlogs">Vlogs</button>
    </div>

    <!-- Main Content -->
    <div class="container">
        
        <!-- Trending -->
        <h2 class="section-title"><i class="fas fa-fire" style="color: #ff4500;"></i> Trending Videos</h2>
        <div class="video-grid" id="trendingGrid">
            <!-- Videos injected via JS -->
            <div class="loader" id="trendingLoader"></div>
        </div>

        <!-- Latest Uploads -->
        <h2 class="section-title"><i class="fas fa-clock" style="color: var(--primary-color);"></i> Latest Uploads</h2>
        <div class="video-grid" id="latestGrid">
            <!-- Videos injected via JS -->
            <div class="loader" id="latestLoader"></div>
        </div>

    </div>

    <!-- Video Player Modal -->
    <div class="video-player-container" id="playerModal">
        <i class="fas fa-times close-player" id="closePlayerBtn"></i>
        
        <div class="player-wrapper">
            <div class="aspect-ratio-box" id="videoContainer">
                <iframe id="videoPreviewIframe" src="" allowfullscreen></iframe>
                <!-- Custom play button overlay to capture first click for ads -->
                <div class="custom-play-action" id="customPlayAction">
                    <i class="fas fa-play-circle big-play-btn"></i>
                </div>
            </div>
        </div>
        
        <div class="player-details">
            <h1 class="player-title" id="playerTitle">Video Title</h1>
        </div>
    </div>

    <!-- Main App Script -->
    <script type="module" src="script.js"></script>
</body>
</html>
